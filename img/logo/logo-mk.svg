<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB800"/>
      <stop offset="100%" style="stop-color:#E69500"/>
    </linearGradient>
  </defs>

  <!-- Gear icon -->
  <g transform="translate(110,170)">
    <circle cx="0" cy="0" r="72" fill="none" stroke="url(#gearGrad)" stroke-width="16" opacity="0.95"/>
    <g stroke="url(#gearGrad)" stroke-width="14" stroke-linecap="round">
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(0)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(30)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(60)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(90)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(120)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(150)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(180)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(210)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(240)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(270)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(300)"/>
      <line x1="0" y1="-84" x2="0" y2="-98" transform="rotate(330)"/>
    </g>
    <circle cx="0" cy="0" r="50" fill="#0A0A0A" stroke="url(#gearGrad)" stroke-width="6"/>
    <text x="0" y="17" font-family="'Barlow Condensed','Arial Black',sans-serif" font-size="38" font-weight="900" fill="#FFB800" text-anchor="middle" letter-spacing="3">EMC</text>
    <path d="M-12,-68 Q30,-100 58,-74" fill="none" stroke="#E69500" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M-22,-60 Q-54,-80 -60,-46" fill="none" stroke="#FFB800" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- ЗЕМЈА -->
  <g transform="translate(280,108)">
    <text font-family="'Barlow Condensed','Arial Black',sans-serif" font-size="68" font-weight="900" letter-spacing="6" fill="#FFFFFF">ЗЕМЈА</text>
  </g>

  <!-- МИНИРАЊЕ И ГРАДЕЖНИШТВО -->
  <g transform="translate(285,158)">
    <text font-family="'Barlow Condensed','Arial Black',sans-serif" font-size="32" font-weight="700" letter-spacing="8" fill="#FFB800">МИНИРАЊЕ И ГРАДЕЖНИШТВО</text>
  </g>

  <!-- Tagline -->
  <g transform="translate(287,198)">
    <text font-family="'Inter','Arial',sans-serif" font-size="19" font-weight="700" letter-spacing="7" fill="#CCCCCC">ОПРЕМА / СЕРВИС И РЕЗЕРВНИ ДЕЛОВИ</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#FFCC00"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Concept 4: Hydraulic/power wave + industrial frame -->
  <g transform="translate(85,110)">
    <!-- Hexagonal frame -->
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" fill="none" stroke="#FFCC00" stroke-width="4" opacity="0.7"/>
    <polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="none" stroke="#F97316" stroke-width="2" opacity="0.5"/>
    
    <!-- EC inside -->
    <text x="0" y="10" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="38" font-weight="900" fill="#FFCC00" text-anchor="middle" letter-spacing="2">EC</text>
    
    <!-- Energy/power wave lines -->
    <path d="M-40,-10 Q-20,-25 0,-10 Q20,5 40,-10" fill="none" stroke="url(#waveGrad)" stroke-width="3" stroke-linecap="round"/>
    <path d="M-40,15 Q-20,0 0,15 Q20,30 40,15" fill="none" stroke="url(#waveGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Small hydraulic cylinder hints -->
    <rect x="-36" y="18" width="10" height="16" rx="2" fill="#F97316" opacity="0.4"/>
    <rect x="26" y="18" width="10" height="16" rx="2" fill="#F97316" opacity="0.4"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(190,85)">
    <text font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="6" fill="#FFFFFF">ENERGY</text>
    <text x="0" y="45" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="28" font-weight="600" letter-spacing="12" fill="#FFCC00">CONTROL</text>
    <text x="0" y="74" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="8" fill="#999999">PREMIUM AFTERMARKET PARTS</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bucketGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC00"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Concept 2: Stylized excavator bucket + lightning bolt icon -->
  <g transform="translate(85,110)">
    <!-- Excavator bucket silhouette -->
    <path d="M-45,-40 L-55,-10 L-55,20 Q-55,35 -35,35 L35,35 L60,10 L55,-15 Q50,-30 35,-40 L25,-48 L10,-48 L-5,-45 Z" 
          fill="url(#bucketGrad)" opacity="0.9"/>
    <!-- Bucket teeth -->
    <rect x="-45" y="30" width="10" height="14" rx="2" fill="#FFCC00"/>
    <rect x="-20" y="30" width="10" height="14" rx="2" fill="#FFCC00"/>
    <rect x="5" y="30" width="10" height="14" rx="2" fill="#FFCC00"/>
    <rect x="30" y="30" width="10" height="14" rx="2" fill="#FFCC00"/>
    
    <!-- Lightning bolt inside bucket -->
    <path d="M-5,-30 L-15,-15 L-5,-15 L-10,5 L10,-15 L0,-15 L10,-30 Z" fill="#0A0A0A"/>
    
    <!-- Hydraulic arm hint -->
    <line x1="-55" y1="-10" x2="-70" y2="-40" stroke="#F97316" stroke-width="5" stroke-linecap="round"/>
    <line x1="-55" y1="20" x2="-75" y2="5" stroke="#FFCC00" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(190,85)">
    <text font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="6" fill="#FFFFFF">ENERGY</text>
    <text x="0" y="45" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="28" font-weight="600" letter-spacing="12" fill="#FFCC00">CONTROL</text>
    <text x="0" y="74" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="8" fill="#999999">PREMIUM AFTERMARKET PARTS</text>
  </g>
</svg>
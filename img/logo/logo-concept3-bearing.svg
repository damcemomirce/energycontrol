<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" width="600" height="220">
  <defs>
    <linearGradient id="bearingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316"/>
      <stop offset="50%" style="stop-color:#FFCC00"/>
      <stop offset="100%" style="stop-color:#F97316"/>
    </linearGradient>
  </defs>
  
  <!-- Concept 3: Bearing ring with EC monogram + energy pulse -->
  <g transform="translate(85,110)">
    <!-- Outer race -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#bearingGrad)" stroke-width="14"/>
    <!-- Inner race -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#bearingGrad)" stroke-width="6"/>
    <!-- Bearing balls -->
    <circle cx="0" cy="-46" r="7" fill="#FFCC00"/>
    <circle cx="32.5" cy="-32.5" r="7" fill="#FFCC00"/>
    <circle cx="46" cy="0" r="7" fill="#FFCC00"/>
    <circle cx="32.5" cy="32.5" r="7" fill="#FFCC00"/>
    <circle cx="0" cy="46" r="7" fill="#FFCC00"/>
    <circle cx="-32.5" cy="32.5" r="7" fill="#FFCC00"/>
    <circle cx="-46" cy="0" r="7" fill="#FFCC00"/>
    <circle cx="-32.5" cy="-32.5" r="7" fill="#FFCC00"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="22" fill="#0A0A0A"/>
    <text x="0" y="8" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="24" font-weight="900" fill="#FFCC00" text-anchor="middle" letter-spacing="2">EC</text>
    <!-- Energy pulse ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#FFCC00" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.5"/>
    <circle cx="0" cy="0" r="72" fill="none" stroke="#F97316" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(190,85)">
    <text font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="52" font-weight="900" letter-spacing="6" fill="#FFFFFF">ENERGY</text>
    <text x="0" y="45" font-family="'Barlow Condensed', 'Arial Black', sans-serif" font-size="28" font-weight="600" letter-spacing="12" fill="#FFCC00">CONTROL</text>
    <text x="0" y="74" font-family="'Inter', Arial, sans-serif" font-size="10" font-weight="500" letter-spacing="8" fill="#999999">PREMIUM AFTERMARKET PARTS</text>
  </g>
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products Catalog — Earth Mining and Construction Equipment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',sans-serif;
      background:#080808;
      color:#fff;
      -webkit-font-smoothing:antialiased;
    }

    /* ═══════════ NAV ═══════════ */
    #topnav{
      position:sticky;top:0;z-index:100;
      display:flex;justify-content:space-between;align-items:center;
      padding:14px 48px;
      background:rgba(8,8,8,0.94);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,184,0,0.08);
    }
    .logo-img{height:100px;width:auto}
    .nav-links{display:flex;align-items:center;gap:32px}
    .nav-links a{
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.9rem;font-weight:600;text-transform:uppercase;
      letter-spacing:0.1em;color:rgba(255,255,255,0.7);text-decoration:none;
      transition:color 0.3s;
    }
    .nav-links a:hover,.nav-links a.active{color:#FFB800}
    .lang-switch{display:flex;border:1px solid rgba(255,184,0,0.3);border-radius:4px;overflow:hidden}
    .lang-switch button{background:transparent;border:none;color:rgba(255,255,255,0.55);font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;padding:6px 12px;cursor:pointer}
    .lang-switch button.active{background:#FFB800;color:#080808}
    #mobile-toggle{display:none;background:none;border:none;color:#FFB800;font-size:1.5rem;cursor:pointer}

    /* ═══════════ PAGE HEADER ═══════════ */
    .page-header{
      background:linear-gradient(180deg,rgba(8,8,8,0.6),rgba(8,8,8,0.85)),
        url('img/mining/mining-excavator-belaz.jpg') center/cover no-repeat;
      padding:64px 48px 48px;text-align:center;
    }
    .page-header h1{
      font-family:'Barlow Condensed',sans-serif;
      font-size:clamp(2rem,5vw,3.8rem);font-weight:900;
      text-transform:uppercase;letter-spacing:0.02em;margin-bottom:8px;
    }
    .page-header h1 span{color:#FFB800}
    .page-header p{
      font-size:1rem;color:rgba(255,255,255,0.55);max-width:500px;margin:0 auto;
    }

    /* ═══════════ LAYOUT ═══════════ */
    .catalog-layout{
      display:grid;grid-template-columns:260px 1fr;
      max-width:1320px;margin:0 auto;padding:32px 48px 64px;gap:32px;
    }

    /* ═══════════ FILTERS SIDEBAR ═══════════ */
    .filters-sidebar{
      position:sticky;top:100px;align-self:start;
    }
    .filter-toggle-mobile{
      display:none;width:100%;background:#0D0D0D;border:1px solid rgba(255,255,255,0.1);
      color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;
      text-transform:uppercase;letter-spacing:0.08em;padding:14px 20px;cursor:pointer;
      text-align:left;
    }
    .filter-group{margin-bottom:24px}
    .filter-group h4{
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.95rem;font-weight:700;text-transform:uppercase;
      letter-spacing:0.08em;color:#FFB800;margin-bottom:12px;
    }
    .filter-group label{
      display:flex;align-items:center;gap:10px;padding:6px 0;
      font-size:0.85rem;color:rgba(255,255,255,0.65);cursor:pointer;
      transition:color 0.2s;
    }
    .filter-group label:hover{color:#fff}
    .filter-group input[type="checkbox"]{
      accent-color:#FFB800;width:16px;height:16px;cursor:pointer;
    }
    .filter-group .count{
      font-size:0.75rem;color:#555;margin-left:auto;
    }

    /* ═══════════ SEARCH BAR ═══════════ */
    .search-bar{
      display:flex;gap:0;margin-bottom:24px;
      background:#0D0D0D;border:1px solid rgba(255,255,255,0.1);
      border-radius:4px;overflow:hidden;
      transition:border-color 0.3s;
    }
    .search-bar:focus-within{border-color:#FFB800}
    .search-bar input{
      flex:1;background:transparent;border:none;padding:15px 20px;
      font-family:'Inter',sans-serif;font-size:0.95rem;color:#fff;outline:none;
    }
    .search-bar input::placeholder{color:#555}
    .search-bar button{
      background:#FFB800;color:#080808;border:none;padding:0 24px;
      font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;font-weight:700;
      text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;
      transition:background 0.3s;
    }
    .search-bar button:hover{background:#E69500}

    /* ═══════════ RESULTS HEADER ═══════════ */
    .results-header{
      display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
    }
    .results-header span{font-size:0.82rem;color:#666}
    .results-header select{
      background:#0D0D0D;border:1px solid rgba(255,255,255,0.1);
      color:#ccc;padding:8px 14px;font-size:0.82rem;border-radius:4px;
      cursor:pointer;
    }

    /* ═══════════ PRODUCT GRID ═══════════ */
    .product-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
    }
    .product-card{
      background:#0D0D0D;border:1px solid rgba(255,255,255,0.06);
      padding:28px 24px;display:flex;flex-direction:column;
      transition:border-color 0.3s,transform 0.3s,box-shadow 0.3s;
      position:relative;
    }
    .product-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,#FFB800,transparent);opacity:0;
      transition:opacity 0.3s;
    }
    .product-card:hover{
      border-color:rgba(255,184,0,0.3);
      transform:translateY(-4px);
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .product-card:hover::before{opacity:1}
    .product-part{
      font-family:'Barlow Condensed',sans-serif;
      font-size:0.82rem;font-weight:700;color:#FFB800;
      text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;
    }
    .product-name{
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.25rem;font-weight:700;text-transform:uppercase;
      letter-spacing:0.03em;line-height:1.2;margin-bottom:8px;
    }
    .product-desc{
      font-size:0.82rem;color:#888;line-height:1.55;margin-bottom:14px;flex:1;
    }
    .product-meta{
      display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;
    }
    .product-tag{
      font-size:0.68rem;font-weight:500;color:#777;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
      padding:3px 10px;border-radius:2px;
    }
    .product-bottom{
      display:flex;justify-content:space-between;align-items:center;
      border-top:1px solid rgba(255,255,255,0.06);padding-top:14px;
    }
    .product-price{
      font-family:'Barlow Condensed',sans-serif;
      font-size:1.1rem;font-weight:700;color:#FFB800;
    }
    .product-price small{font-size:0.7rem;color:#666;font-weight:400}
    .btn-quote-sm{
      background:transparent;color:#FFB800;border:1px solid rgba(255,184,0,0.3);
      font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:700;
      text-transform:uppercase;letter-spacing:0.06em;padding:7px 16px;cursor:pointer;
      text-decoration:none;transition:background 0.3s,color 0.3s;
    }
    .btn-quote-sm:hover{background:#FFB800;color:#080808}

    /* ═══════════ NO RESULTS ═══════════ */
    .no-results{
      text-align:center;padding:64px 24px;grid-column:1/-1;
    }
    .no-results i{font-size:3rem;color:#333;margin-bottom:16px}
    .no-results h3{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;color:#666;text-transform:uppercase;margin-bottom:8px}
    .no-results p{font-size:0.9rem;color:#555}

    /* ═══════════ FOOTER ═══════════ */
    footer{
      background:#040404;text-align:center;padding:40px 24px 28px;
      font-size:0.82rem;color:#555;border-top:1px solid #111;
    }
    footer a{color:#FFB800;text-decoration:none}

    /* ═══════════ RESPONSIVE ═══════════ */
    @media(max-width:1024px){
      .product-grid{grid-template-columns:repeat(2,1fr)}
      .catalog-layout{padding:24px 32px 48px}
    }
    @media(max-width:768px){
      #topnav{padding:12px 16px}
      .nav-links{display:none}
      #mobile-toggle{display:block}
      .logo-img{height:56px}
      .lang-switch{display:none}

      .page-header{padding:48px 16px 36px}
      .catalog-layout{grid-template-columns:1fr;padding:20px 16px 40px;gap:0}
      .filters-sidebar{position:static;margin-bottom:20px}
      .filters-sidebar .filters-inner{display:none}
      .filters-sidebar.open .filters-inner{display:block}
      .filter-toggle-mobile{display:block}
      .product-grid{grid-template-columns:1fr;gap:10px}
      .results-header{flex-direction:column;gap:10px;align-items:flex-start}
      .product-card{padding:22px 18px}
    }
    @media(max-width:480px){
      .search-bar input{font-size:0.85rem;padding:12px 14px}
      .search-bar button{padding:0 16px;font-size:0.85rem}
    }
  </style>
</head>

        'header.line1':'PRODUCTS','header.line2':'CATALOG','header.sub':'Browse our complete range of premium OEM and aftermarket parts',
        'filters.toggle':'☰ Filters','filters.brand':'Machine Brand','filters.category':'Category','filters.price':'Price Range',
        'cat.engine':'Engine Parts','cat.hydraulic':'Hydraulic Parts','cat.mining':'Mining Parts','cat.undercarriage':'Undercarriage','cat.electrical':'Electrical','cat.filters':'Filters',
        'price.budget':'Budget ($100–$500)','price.mid':'Mid-Range ($500–$2,000)','price.premium':'Premium ($2,000+)',
        'search.placeholder':'Search by Part Number or Machine Model…','search.btn':'Search',
        'results.showing':'Showing {n} products','results.none_title':'No Products Found','results.none_sub':'Try adjusting your search or filters',
        'sort.default':'Sort: Default','sort.name':'Sort: Name A–Z','sort.price-asc':'Sort: Price Low–High','sort.price-desc':'Sort: Price High–Low',
        'card.quote':'Request Quote','footer.back':'← Back to Homepage',
      },
      mk: {
        'nav.home':'Почетна','nav.catalog':'Каталог на Производи','nav.about':'За Нас','nav.contact':'Контакт',
        'header.line1':'КАТАЛОГ НА','header.line2':'ПРОИЗВОДИ','header.sub':'Прегледајте ја нашата комплетна палета на премиум ОЕМ и резервни делови',
        'filters.toggle':'☰ Филтри','filters.brand':'Марка на Машина','filters.category':'Категорија','filters.price':'Ценовен Ранг',
        'cat.engine':'Делови за Мотор','cat.hydraulic':'Хидраулични Делови','cat.mining':'Рударски Делови','cat.undercarriage':'Подвозје','cat.electrical':'Електрика','cat.filters':'Филтри',
        'price.budget':'Економски ($100–$500)','price.mid':'Среден Ранг ($500–$2,000)','price.premium':'Премиум ($2,000+)',
        'search.placeholder':'Пребарај по број на дел или модел на машина…','search.btn':'Пребарај',
        'results.showing':'Прикажани {n} производи','results.none_title':'Нема Пронајдени Производи','results.none_sub':'Обидете се да ги прилагодите вашето пребарување или филтри',
        'sort.default':'Подреди: Основно','sort.name':'Подреди: Име А–Ш','sort.price-asc':'Подреди: Цена Ниско–Високо','sort.price-desc':'Подреди: Цена Високо–Ниско',
        'card.quote':'Побарај Понудa','footer.back':'← Назад кон Почетна',
      }
    };

    let currentLang = localStorage.getItem('emc-lang') || 'en';

    function t(key, replacements={}) {
      let text = (i18n[currentLang] && i18n[currentLang][key]) || i18n['en'][key] || key;
      Object.entries(replacements).forEach(([k,v]) => text = text.replace(`{${k}}`,v));
      return text;
    }

    function applyLang() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-lang-code]').forEach(b => b.classList.toggle('active', b.getAttribute('data-lang-code') === currentLang));

      // Update logo
      const logo = document.getElementById('main-logo');
      if (logo) logo.src = currentLang === 'mk' ? 'img/logo/logo-mk.svg' : 'img/logo/logo-main-horizontal.svg';

      // Update all i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const text = (i18n[currentLang] && i18n[currentLang][key]) || (i18n['en'] && i18n['en'][key]) || key;
        el.textContent = text;
      });

      // Update placeholder
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        const phKey = searchInput.getAttribute('data-i18n-placeholder');
        searchInput.placeholder = (i18n[currentLang] && i18n[currentLang][phKey]) || 'Search…';
      }

      // Update title
      document.title = currentLang === 'mk' ? 'Каталог на Производи — Земја Минирање и Градежна Опрема' : 'Products Catalog — Earth Mining and Construction Equipment';

      // Re-render products
      renderProducts();
    }

    document.querySelectorAll('[data-lang-code]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentLang = btn.getAttribute('data-lang-code');
        localStorage.setItem('emc-lang', currentLang);
        applyLang();
      });
    });

    // ═══════════ FILTER & RENDER ═══════════
    let activeFilters = { brand: [], category: [], price: [] };

    function getActiveFilters() {
      const f = { brand: [], category: [], price: [] };
      document.querySelectorAll('.filter-check:checked').forEach(cb => {
        const type = cb.getAttribute('data-filter');
        if (f[type]) f[type].push(cb.value);
      });
      return f;
    }

    function renderProducts() {
      activeFilters = getActiveFilters();
      const searchQuery = document.getElementById('search-input').value.toLowerCase().trim();
      const sortBy = document.getElementById('sort-select').value;
      const grid = document.getElementById('product-grid');

      let filtered = products.filter(p => {
        // Search
        if (searchQuery && !p.part.toLowerCase().includes(searchQuery) && !p.name.toLowerCase().includes(searchQuery) && !p.desc.toLowerCase().includes(searchQuery) && !p.brands.some(b => b.toLowerCase().includes(searchQuery))) {
          return false;
        }
        // Brand filter
        if (activeFilters.brand.length && !p.brands.some(b => activeFilters.brand.includes(b))) return false;
        // Category filter
        if (activeFilters.category.length && !activeFilters.category.includes(p.category)) return false;
        // Price filter
        if (activeFilters.price.length && !activeFilters.price.includes(p.priceTier)) return false;
        return true;
      });

      // Sort
      if (sortBy === 'name') filtered.sort((a,b) => a.name.localeCompare(b.name));
      else if (sortBy === 'price-asc') filtered.sort((a,b) => parseFloat(a.price.split('–')[0].replace(/[$,]/g,'')) - parseFloat(b.price.split('–')[0].replace(/[$,]/g,'')));
      else if (sortBy === 'price-desc') filtered.sort((a,b) => parseFloat(b.price.split('–')[0].replace(/[$,]/g,'')) - parseFloat(a.price.split('–')[0].replace(/[$,]/g,'')));

      // Update count
      document.getElementById('results-count').textContent = t('results.showing', {n: filtered.length});

      if (!filtered.length) {
        grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i><h3>${t('results.none_title')}</h3><p>${t('results.none_sub')}</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => `
        <div class="product-card">
          <div class="product-part">${p.part}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-meta">
            ${p.brands.map(b => `<span class="product-tag">${b}</span>`).join('')}
            <span class="product-tag">${p.category}</span>
          </div>
          <div class="product-bottom">
            <div class="product-price">${p.price}<br><small>${currentLang==='mk'?'Цена по барање':'Price on request'}</small></div>
            <a href="mailto:sales@energycontrol.com.mk?subject=${encodeURIComponent('Quote: '+p.part)}" class="btn-quote-sm">${t('card.quote')}</a>
          </div>
        </div>
      `).join('');
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', renderProducts);
    document.getElementById('search-btn').addEventListener('click', e => { e.preventDefault(); renderProducts(); });
    document.getElementById('sort-select').addEventListener('change', renderProducts);
    document.querySelectorAll('.filter-check').forEach(cb => cb.addEventListener('change', renderProducts));

    // Mobile filter toggle
    document.getElementById('filter-toggle').addEventListener('click', () => {
      document.getElementById('filters-sidebar').classList.toggle('open');
    });

    // Initial render
    applyLang();

    // Mobile menu
    document.getElementById('mobile-toggle').addEventListener('click', () => {
      alert('Mobile menu — link to full site navigation');
    });
  </script>
</body>
</html>
